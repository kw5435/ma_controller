; ============================================================
;  Music Assistant CYD Controller
;  Board: ESP32-2432S028 (Cheap Yellow Display)
;  Display: ILI9341 2.8" 240x320  Touch: XPT2046
; ============================================================
[env:cyd_esp32]
platform  = espressif32 @ 6.5.0
board     = esp32dev
framework = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default
upload_speed    = 921600

board_build.flash_size  = 4MB
board_build.partitions  = min_spiffs.csv
board_build.f_cpu       = 240000000L
board_build.f_flash     = 80000000L
board_build.flash_mode  = dio

lib_deps =
    lovyan03/LovyanGFX         @ ^1.1.16
    lvgl/lvgl                  @ ^8.3.11
    bblanchon/ArduinoJson      @ ^6.21.5
    links2004/WebSockets       @ ^2.4.1
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    Bodmer/TJpg_Decoder        @ ^1.0.8

build_flags =
    -Os
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
    -Isrc
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320

; ── Post-build: merge into single .bin for web flashing ──────────────
; Creates .pio/build/cyd_esp32/firmware-merged.bin
extra_scripts = post:merge_firmware.py
