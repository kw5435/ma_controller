name: Build & Release Firmware

on:
  push:
    branches: [main, master]
    tags:    ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO & esptool
        run: pip install platformio esptool

      - name: Build firmware
        run: |
          pio run -e cyd_esp32 2>&1 | tee /tmp/pio.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            git config user.email "ci@github.com" && git config user.name "CI"
            git checkout --orphan build-log-tmp && git rm -rf . -q || true
            tail -120 /tmp/pio.log > build_error.log
            git add build_error.log
            git commit --no-gpg-sign -m "log"
            git push origin HEAD:build-log --force
          fi
          exit $EXIT

      - name: Create merged firmware binary
        run: |
          esptool.py --chip esp32 merge_bin \
            --output firmware-merged.bin \
            0x1000  .pio/build/cyd_esp32/bootloader.bin \
            0x8000  .pio/build/cyd_esp32/partitions.bin \
            0xe000  ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/cyd_esp32/firmware.bin

      - name: Stage web flasher artifacts
        run: |
          mkdir -p web-flasher/firmware
          cp firmware-merged.bin web-flasher/firmware/firmware-merged.bin
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then VERSION="dev-$(git rev-parse --short HEAD)"; fi
          sed "s/__VERSION__/${VERSION}/g" web-flasher/manifest.json.tmpl \
            > web-flasher/manifest.json
          echo "Built version: $VERSION"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            firmware-merged.bin
            web-flasher/manifest.json

      - name: Deploy web flasher to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-flasher
          keep_files: false

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware-merged.bin
          body: |
            ## MA Controller ${{ github.ref_name }}

            ### Flash via Web Browser
            Open: **https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/**

            ### Manual Flash
            ```bash
            esptool.py --port /dev/ttyUSB0 --baud 460800 write_flash 0x0 firmware-merged.bin
            ```
